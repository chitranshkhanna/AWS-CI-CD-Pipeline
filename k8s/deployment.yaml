apiVersion: apps/v1
kind: Deployment
metadata:
  name: expense-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: expense-app

  template:
    metadata:
      labels:
        app: expense-app

    spec:
      containers:
      - name: expense-app
        image: 374031960771.dkr.ecr.us-east-1.amazonaws.com/expense-backend:latest

        ports:
        - containerPort: 5000
